databases:
  - name: aomvp-postgres
    databaseName: ao_mvp
    user: ao_mvp
    plan: free
    region: frankfurt

services:
  - type: web
    name: aomvp-backend
    runtime: docker
    repo: https://github.com/HanPass/AOMVP.git
    branch: main
    plan: free
    region: frankfurt
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev
      - key: JPA_DDL_AUTO
        value: update
      - key: JPA_SHOW_SQL
        value: false
      - key: SCRAPER_FIXED_DELAY_MS
        value: "3600000"
      - key: SCRAPER_MAX_ITEMS_PER_RUN
        value: "50"
      - key: ALERT_MAIL_ENABLED
        value: false
      - key: DB_URL
        fromDatabase:
          name: aomvp-postgres
          property: connectionString

  - type: web
    name: aomvp-front
    runtime: static
    repo: https://github.com/HanPass/AOMVP-Front.git
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: dist/aomvp-front/browser
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
