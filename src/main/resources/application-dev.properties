spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ao_mvp}
spring.datasource.username=${DB_USERNAME:ao_mvp}
spring.datasource.password=${DB_PASSWORD:ao_mvp}

spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:ao_mvp}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
app.alert.mail.from=${ALERT_MAIL_FROM:${MAIL_USERNAME:}}
app.alert.mail.subject-prefix=${ALERT_SUBJECT_PREFIX:[AO]}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

app.alert.mail.enabled=${ALERT_MAIL_ENABLED:false}
app.scraper.fixed-delay-ms=${SCRAPER_FIXED_DELAY_MS:30000}
app.scraper.max-items-per-run=${SCRAPER_MAX_ITEMS_PER_RUN:100}

# Keycloak / OAuth2
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/ao-mvp}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/ao-mvp/protocol/openid-connect/certs}
